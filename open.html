@font-face{font-family:'Instrument Serif';src:url('fonts/InstrumentSerif-Regular.woff2') format('woff2'),url('fonts/InstrumentSerif-Regular.ttf') format('truetype');font-weight:400;font-style:normal;font-display:swap}

:root{
    --blue:#0430C2;--sunglow:#FFC752;--ink:#0D0D0D;--ash:#8A8A8A;
    --canvas:#FAFAFA;--white:#FFFFFF;--graphite:#5C5C5C;--border:#D4C8B0;
    --r-soft:8px;--r-card:16px;--r-pill:999px;
    --font-h:'Instrument Serif',Georgia,serif;--font-b:'Bricolage Grotesque',-apple-system,BlinkMacSystemFont,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font-b);background:var(--canvas);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.65;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:1.5rem}
a{color:inherit}

.logo{height:34px;width:auto;margin-bottom:2rem}

.spinner{width:34px;height:34px;border-radius:50%;border:3px solid rgba(4,48,194,.18);border-top-color:var(--blue);animation:spin .8s linear infinite;margin:0 auto 1.2rem}
@keyframes spin{to{transform:rotate(360deg)}}

h1{font-family:var(--font-h);font-weight:400;font-size:clamp(1.8rem,5vw,2.4rem);letter-spacing:-.01em;line-height:1.1;margin-bottom:.5rem}
.sub{font-size:.98rem;color:var(--graphite);margin-bottom:1.6rem}

.btn-pill{display:inline-block;background:var(--sunglow);color:var(--ink);font-family:var(--font-b);font-weight:600;font-size:1rem;border:none;border-radius:var(--r-pill);padding:.8rem 1.9rem;cursor:pointer;text-decoration:none;transition:transform .1s,box-shadow .15s}
.btn-pill:hover{box-shadow:0 8px 20px -8px rgba(140,94,16,.5);transform:translateY(-1px)}

.badges{display:flex;justify-content:center;gap:.8rem;margin-top:1.4rem;flex-wrap:wrap}
.badges img{height:44px;width:auto;display:block}

.home-link{margin-top:1.8rem;font-size:.82rem;color:var(--ash);text-decoration:none}
.home-link:hover{color:var(--blue)}
</style>

<img class="logo" src="assets/logo.png" alt="PlanPin">
<div class="spinner" id="spinner"></div>
<h1 id="title">Opening PlanPin&hellip;</h1>
<p class="sub" id="sub">If it doesn't open automatically, tap the button below.</p>

<a href="#" id="openBtn" class="btn-pill">Open PlanPin</a>

<div class="badges">
    <a href="https://apps.apple.com/us/app/planpin-ai-travel-planner/id6767165655" target="_blank" rel="noopener">
        <img src="assets/badge-appstore.png" alt="Download on the App Store">
    </a>
    <a href="https://play.google.com/store/apps/details?id=ai.affinitylabs.planpin" target="_blank" rel="noopener">
        <img src="assets/badge-playstore.png" alt="Get it on Google Play">
    </a>
</div>

<a href="/" class="home-link">Back to planpin.com</a>

<script>
var STORE_IOS = 'https://apps.apple.com/us/app/planpin-ai-travel-planner/id6767165655';
var STORE_AND = 'https://play.google.com/store/apps/details?id=ai.affinitylabs.planpin';
var ua = navigator.userAgent || '';
var isIOS = /iPad|iPhone|iPod/.test(ua) || (ua.includes('Macintosh') && 'ontouchend' in document);
var isAndroid = /Android/.test(ua);

// Optional path: open.html?to=plan -> planpin://plan (defaults to home).
var to = new URLSearchParams(location.search).get('to') || '';
var DEEP_LINK = 'planpin://' + to.replace(/^\/+/, '');

function openApp(){
    if (isIOS || isAndroid) {
        // Hand off to the app. No auto-bounce to the App Store — installed app opens;
        // otherwise the store badges below are the manual fallback.
        location.href = DEEP_LINK;
    } else {
        window.open(STORE_IOS, '_blank', 'noopener');
    }
}

document.getElementById('openBtn').addEventListener('click', function(e){
    e.preventDefault();
    if (typeof gtag === 'function') gtag('event', 'app_open_click', { link_location: 'open_page' });
    if (typeof fbq === 'function') fbq('trackCustom', 'AppOpenClick', { location: 'open_page' });
    openApp();
});

// GA4 + Meta Pixel: track manual store-badge clicks (fallback when the app isn't installed).
document.querySelectorAll('a[href*="apps.apple.com"], a[href*="play.google.com"]').forEach(function(a){
    a.addEventListener('click', function(){
        var store = a.href.indexOf('apps.apple.com') > -1 ? 'ios' : 'android';
        if (typeof gtag === 'function') gtag('event', 'store_click', { store: store, link_location: 'open_page' });
        if (typeof fbq === 'function') fbq('trackCustom', 'StoreClick', { store: store, location: 'open_page' });
    });
});

if (isIOS || isAndroid) {
    setTimeout(openApp, 400);
    document.getElementById('sub').textContent = "If it doesn't open automatically, tap the button below.";
} else {
    // Desktop: nothing to open. Show a clear "get it on your phone" state.
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('title').textContent = 'Get PlanPin on your phone';
    document.getElementById('sub').textContent = 'PlanPin is an iOS and Android app. Grab it below.';
    document.getElementById('openBtn').style.display = 'none';
}
</script>

</body>
</html>
