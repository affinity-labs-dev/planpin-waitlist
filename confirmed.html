:root{
    --blue:#0430C2;--sunglow:#FFC752;--gold:#FFDD63;--ink:#0D0D0D;--ash:#8A8A8A;
    --canvas:#FAFAFA;--white:#FFFFFF;--lilac:#B5A3F3;--amber-ink:#8C5E10;--graphite:#5C5C5C;--border:#D4C8B0;
    --r-soft:8px;--r-card:16px;--r-pill:999px;
    --font-h:'Instrument Serif',Georgia,serif;--font-b:'Bricolage Grotesque',-apple-system,BlinkMacSystemFont,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;overflow-x:hidden}
body{font-family:var(--font-b);background:var(--canvas);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.65}
a{color:inherit}

.container{max-width:1080px;margin:0 auto;padding:0 clamp(1.4rem,5vw,2.5rem);width:100%}

.nav{position:sticky;top:0;z-index:50;background:rgba(250,250,250,.82);backdrop-filter:blur(16px) saturate(1.5);-webkit-backdrop-filter:blur(16px) saturate(1.5);border-bottom:1px solid rgba(212,200,176,.5)}
.nav-inner{max-width:1080px;margin:0 auto;padding:.7rem clamp(1.4rem,5vw,2.5rem);display:flex;align-items:center;justify-content:space-between;gap:1rem}
.nav-logo{height:32px;width:auto;display:block}
.back-link{display:inline-flex;align-items:center;gap:.4rem;font-size:.85rem;color:var(--graphite);text-decoration:none;font-weight:600;transition:color .2s}
.back-link:hover{color:var(--blue)}
.back-link svg{width:15px;height:15px}

.wrap{display:flex;justify-content:center;padding:clamp(2.5rem,7vw,5rem) 0}
.confirm-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-card);padding:clamp(2rem,5vw,3rem) clamp(1.6rem,4vw,2.6rem);max-width:520px;width:100%;text-align:center}

.check{width:64px;height:64px;border-radius:var(--r-pill);background:rgba(4,48,194,.08);display:inline-flex;align-items:center;justify-content:center;margin-bottom:1.4rem}
.check svg{width:30px;height:30px;color:var(--blue)}

.confirm-card h1{font-family:var(--font-h);font-weight:400;font-size:clamp(2.2rem,6vw,3rem);letter-spacing:-.01em;line-height:1.04;margin-bottom:.6rem}
.confirm-card p{font-size:1rem;color:var(--graphite);margin-bottom:1.6rem}
.confirm-card p .muted{color:var(--ash)}

.btn-pill{display:inline-block;background:var(--sunglow);color:var(--ink);font-family:var(--font-b);font-weight:600;font-size:1rem;border:none;border-radius:var(--r-pill);padding:.85rem 2rem;cursor:pointer;text-decoration:none;transition:transform .1s,box-shadow .15s}
.btn-pill:hover{box-shadow:0 8px 20px -8px rgba(140,94,16,.5);transform:translateY(-1px)}
.btn-pill:active{transform:translateY(0)}

.badges{display:flex;justify-content:center;gap:.8rem;margin-top:1.4rem;flex-wrap:wrap}
.badges img{height:46px;width:auto;display:block}

.footer{padding:3rem 0;text-align:center;border-top:1px solid var(--border);font-size:.78rem;color:var(--ash);margin-top:1rem}
.footer a{color:var(--graphite);text-decoration:none;transition:color .2s}
.footer a:hover{color:var(--blue)}
.footer-brand{font-family:var(--font-h);font-size:1.1rem;color:var(--ink);margin-bottom:.3rem}
.footer-links{display:flex;justify-content:center;gap:1.5rem;margin-top:.8rem;flex-wrap:wrap}

<script>
// ---- Optional: log who acted on the confirm email (reputation analytics) ----
// Mirrors the support.html Supabase pattern. Safe no-op if the table doesn't exist yet.
const SUPABASE_URL = 'https://jszwnlyrvpuiiifdqtyn.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpzendubHlydnB1aWlpZmRxdHluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MjQ3MDIsImV4cCI6MjA5MTMwMDcwMn0.E24UDFVtjZAisLyybTKoOlZwFokenTxyw1hcAPgJ1Wk';

(function logConfirmation(){
    try {
        var token = new URLSearchParams(location.search).get('t');
        if (!token) return;
        fetch(SUPABASE_URL + '/rest/v1/email_confirmations', {
            method: 'POST',
            headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
                'Content-Type': 'application/json',
                'Prefer': 'return=minimal'
            },
            body: JSON.stringify({ token: token, user_agent: navigator.userAgent })
        }).catch(function(){ /* analytics only — never block the user */ });
    } catch (e) { /* ignore */ }
})();

// ---- Open the app (planpin:// home) with App Store / Play Store fallback ----
var STORE_IOS = 'https://apps.apple.com/us/app/planpin-ai-travel-planner/id6767165655';
var STORE_AND = 'https://play.google.com/store/apps/details?id=ai.affinitylabs.planpin';
var ua = navigator.userAgent || '';
var isIOS = /iPad|iPhone|iPod/.test(ua) || (ua.includes('Macintosh') && 'ontouchend' in document);
var isAndroid = /Android/.test(ua);
var DEEP_LINK = 'planpin://';

function openApp(){
    if (isIOS || isAndroid) {
        // Hand off to the app. We do NOT auto-bounce to the App Store — if the app
        // is installed it opens; if not, the user can tap the store badges below.
        location.href = DEEP_LINK;
    } else {
        window.open(STORE_IOS, '_blank', 'noopener');
    }
}

document.getElementById('openBtn').addEventListener('click', function(e){ e.preventDefault(); openApp(); });

// Auto-attempt on mobile once the success state renders. If iOS blocks the
// automatic hand-off (no user gesture), the "Open PlanPin" button still works.
if (isIOS || isAndroid) {
    setTimeout(openApp, 600);
    document.getElementById('openingNote').textContent = "If it doesn't open, tap below.";
} else {
    document.getElementById('openingNote').textContent = 'Get it on your phone below.';
}
</script>
