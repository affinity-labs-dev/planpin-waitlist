<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Get started · PlanPin</title>
<meta name="description" content="Answer a few questions and PlanPin will turn the spots you save into a day-by-day trip, personalized to how you travel.">
<meta name="robots" content="noindex,follow">
<meta name="theme-color" content="#FAFAFA">
<link rel="canonical" href="https://planpin.com/start.html">
<link rel="icon" type="image/png" href="favicon.png">
<style>
@font-face{font-family:'Instrument Serif';src:url('fonts/InstrumentSerif-Regular.woff2') format('woff2'),url('fonts/InstrumentSerif-Regular.ttf') format('truetype');font-weight:400;font-style:normal;font-display:swap}
@font-face{font-family:'Bricolage Grotesque';src:url('fonts/BricolageGrotesque-Variable.woff2') format('woff2'),url('fonts/BricolageGrotesque-Variable.ttf') format('truetype');font-weight:300 800;font-style:normal;font-display:swap}

:root{
    --blue:#0430C2;--sunglow:#FFC752;--gold:#FFDD63;
    --ink:#0D0D0D;--black:#080808;--ash:#8A8A8A;
    --canvas:#FAFAFA;--white:#FFFFFF;
    --sky:#B5DEF0;--blush:#EDAEB3;--peach:#EEA381;--cream:#FFE9D6;--marigold:#FFD06E;--lilac:#B5A3F3;--mist:#B8CFE1;
    --amber-ink:#8C5E10;--graphite:#5C5C5C;--border:#D4C8B0;
    --r-soft:8px;--r-card:16px;--r-sheet:24px;--r-pill:999px;
    --font-h:'Instrument Serif',Georgia,serif;--font-b:'Bricolage Grotesque',-apple-system,BlinkMacSystemFont,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{overflow-x:hidden}
body{font-family:var(--font-b);background:var(--canvas);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.6;min-height:100vh}
a{color:inherit;text-decoration:none}
img{max-width:100%}
.eyebrow{font-size:.74rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--blue)}

/* ── progress top bar ── */
.topbar{position:sticky;top:0;z-index:40;background:rgba(250,250,250,.86);backdrop-filter:blur(16px) saturate(1.5);-webkit-backdrop-filter:blur(16px) saturate(1.5);border-bottom:1px solid rgba(212,200,176,.5)}
.topbar-inner{max-width:640px;margin:0 auto;padding:.7rem clamp(1.1rem,5vw,1.6rem);display:flex;align-items:center;gap:.9rem}
.back-btn{flex-shrink:0;width:34px;height:34px;border-radius:var(--r-pill);border:1px solid var(--border);background:var(--white);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink);transition:border-color .2s,opacity .2s}
.back-btn:hover{border-color:var(--blue)}
.back-btn:disabled{opacity:0;pointer-events:none}
.back-btn svg{width:16px;height:16px}
.progress{flex:1;height:8px;background:rgba(212,200,176,.4);border-radius:var(--r-pill);overflow:hidden}
.progress-fill{height:100%;width:0;background:var(--sunglow);border-radius:var(--r-pill);transition:width .45s cubic-bezier(.22,1,.36,1)}
.restart-btn{flex-shrink:0;background:none;border:none;font-family:var(--font-b);font-size:.78rem;font-weight:600;color:var(--graphite);cursor:pointer;padding:.3rem .15rem;white-space:nowrap}
.restart-btn:hover{color:var(--blue)}
.topbar.hidden{visibility:hidden}

/* ── stage / screens ── */
.stage{max-width:640px;margin:0 auto;padding:clamp(1.4rem,4vw,2.4rem) clamp(1.1rem,5vw,1.6rem) calc(2rem + env(safe-area-inset-bottom));min-height:calc(100vh - 56px);display:flex;flex-direction:column}
.screen{display:none;animation:fade .4s ease both}
.screen.active{display:flex;flex-direction:column;flex:1}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes pop{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:none}}
@media(prefers-reduced-motion:reduce){.screen,.progress-fill,[data-bar],[data-meter-fill]{animation:none!important;transition:none!important}}

.q-head{margin-bottom:1.3rem}
.q-phase{margin-bottom:.7rem;display:block}
.q-title{font-family:var(--font-h);font-weight:400;font-size:clamp(1.85rem,5.2vw,2.6rem);line-height:1.08;letter-spacing:-.01em}
.q-sub{font-size:1rem;color:var(--graphite);margin-top:.6rem;max-width:36ch}

/* ── option cards (list / grid / chips / segment) ── */
.options{display:flex;flex-direction:column;gap:.55rem}
.options.grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
.options.chips{flex-direction:row;flex-wrap:wrap;gap:.5rem}
.options.segment{display:grid;grid-auto-flow:column;grid-auto-columns:1fr;gap:.5rem}
.opt{position:relative;display:flex;align-items:center;gap:.7rem;width:100%;text-align:left;background:var(--white);border:1.5px solid var(--border);border-radius:var(--r-card);padding:.95rem 1.05rem;font-family:var(--font-b);font-size:1rem;font-weight:500;color:var(--ink);cursor:pointer;transition:border-color .15s,background .15s,transform .1s}
.opt:hover{border-color:var(--blue)}
.opt:active{transform:scale(.99)}
.opt .tick{flex-shrink:0;width:22px;height:22px;border-radius:var(--r-pill);border:1.5px solid var(--border);display:inline-flex;align-items:center;justify-content:center;transition:all .15s;margin-left:auto}
.opt .tick svg{width:13px;height:13px;color:#fff;opacity:0;transition:opacity .15s}
.opt.selected{border-color:var(--blue);background:rgba(4,48,194,.06)}
.opt.selected .tick{background:var(--blue);border-color:var(--blue)}
.opt.selected .tick svg{opacity:1}
.opt .ic-img{flex-shrink:0;width:34px;height:34px;object-fit:contain;display:block}
/* image-card grid variant */
.options.grid .opt{flex-direction:column;align-items:center;text-align:center;gap:.55rem;padding:1.1rem .7rem;min-height:128px;justify-content:center}
.options.grid .opt .ic-img{width:62px;height:62px}
.options.grid .opt .tick{position:absolute;top:.55rem;right:.55rem;margin:0;width:20px;height:20px}
.options.grid .opt .opt-label{font-weight:600;font-size:.93rem;line-height:1.2}
/* chips variant */
.options.chips .opt{width:auto;border-radius:var(--r-pill);padding:.6rem .95rem;gap:.45rem}
.options.chips .opt .ic-img{width:22px;height:22px}
.options.chips .opt .tick{display:none}
.options.chips .opt.selected{background:rgba(4,48,194,.08)}
/* segment variant */
.options.segment .opt{flex-direction:column;gap:.35rem;text-align:center;padding:.85rem .4rem;font-size:.86rem}
.options.segment .opt .ic-img{width:34px;height:34px}
.options.segment .opt .tick{display:none}

/* ── slider ── */
.slider-wrap{padding:1rem 0 .4rem}
.slider-val{font-family:var(--font-h);font-size:1.6rem;text-align:center;margin-bottom:.8rem;color:var(--blue)}
input[type=range]{width:100%;-webkit-appearance:none;appearance:none;height:8px;border-radius:var(--r-pill);background:linear-gradient(90deg,var(--sunglow),var(--marigold));outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:28px;height:28px;border-radius:50%;background:var(--blue);border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.2);cursor:pointer}
input[type=range]::-moz-range-thumb{width:28px;height:28px;border-radius:50%;background:var(--blue);border:3px solid #fff;cursor:pointer}
.slider-ends{display:flex;justify-content:space-between;font-size:.8rem;color:var(--ash);margin-top:.7rem}

/* ── likert battery ── */
.likert-row{margin-bottom:1.3rem}
.likert-q{font-size:.98rem;font-weight:600;margin-bottom:.55rem}
.scale{display:flex;align-items:center;gap:.5rem}
.scale .ends{font-size:.72rem;color:var(--ash);white-space:nowrap;max-width:5.5ch;line-height:1.1}
.cells{display:flex;gap:.35rem;flex:1;justify-content:center}
.cell{flex:1;max-width:48px;height:44px;border:1.5px solid var(--border);border-radius:var(--r-soft);background:var(--white);font-weight:600;color:var(--graphite);cursor:pointer;transition:all .12s;font-family:var(--font-b)}
.cell:hover{border-color:var(--blue)}
.cell.on{background:var(--blue);border-color:var(--blue);color:#fff}

/* ── email ── */
.email-input{width:100%;background:var(--white);border:1.5px solid var(--border);border-radius:var(--r-card);padding:.95rem 1.1rem;font-family:var(--font-b);font-size:1.05rem;color:var(--ink);outline:none;transition:border-color .2s,box-shadow .2s}
.email-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(4,48,194,.12)}
.email-input::placeholder{color:var(--ash)}
.email-note{font-size:.82rem;color:var(--graphite);margin-top:.9rem;display:flex;gap:.45rem;align-items:flex-start}
.email-note svg{width:15px;height:15px;flex-shrink:0;margin-top:.15rem;color:var(--blue)}
.field-err{color:#b3261e;font-size:.85rem;margin-top:.6rem;display:none}
.field-err.show{display:block}

/* ── actions ── */
.q-actions{margin-top:auto;padding-top:1.5rem}
.btn-pill{display:inline-flex;align-items:center;justify-content:center;width:100%;background:var(--sunglow);color:var(--ink);font-family:var(--font-b);font-weight:600;font-size:1rem;padding:.95rem 1.4rem;border:none;border-radius:var(--r-pill);white-space:nowrap;cursor:pointer;transition:transform .15s ease,box-shadow .15s ease}
.btn-pill:hover{transform:translateY(-1px);box-shadow:0 8px 20px -8px rgba(140,94,16,.5)}
.btn-pill:active{transform:translateY(0)}
.btn-pill:disabled{opacity:.5;cursor:default;transform:none;box-shadow:none}
.btn-ghost{display:block;width:100%;text-align:center;margin-top:.8rem;background:none;border:none;font-family:var(--font-b);font-size:.9rem;font-weight:600;color:var(--graphite);cursor:pointer;padding:.5rem}
.btn-ghost:hover{color:var(--blue)}

/* ── intro ── */
.intro{flex:1;display:flex;flex-direction:column;justify-content:center;text-align:center;align-items:center}
.intro-illus{width:clamp(150px,42vw,210px);height:auto;margin-bottom:.4rem}
.intro-logo{height:30px;margin-bottom:1.4rem}
.intro h1{font-family:var(--font-h);font-weight:400;font-size:clamp(2.3rem,7vw,3.4rem);line-height:1.04;letter-spacing:-.015em;max-width:14ch}
.intro h1 .accent{color:var(--blue)}
.intro p{font-size:clamp(1.02rem,1.6vw,1.16rem);color:var(--graphite);margin:1.1rem auto 0;max-width:32ch}
.intro-meta{margin-top:1.2rem;font-size:.85rem;color:var(--ash)}
.intro-meta .stars{color:var(--marigold);letter-spacing:.05em}
.intro .q-actions{max-width:380px;margin-left:auto;margin-right:auto;width:100%}

/* ── interstitial shared ── */
.inter{flex:1;display:flex;flex-direction:column;justify-content:center;text-align:center;align-items:center}
.inter h2{font-family:var(--font-h);font-weight:400;font-size:clamp(1.9rem,5.4vw,2.6rem);line-height:1.1}
.inter p{font-size:1rem;color:var(--graphite);margin-top:.6rem;max-width:34ch}
.inter-illus{width:clamp(120px,34vw,180px);height:auto;margin-bottom:.6rem}

/* ── recap (your starting point) ── */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-card);padding:1.2rem 1.3rem;text-align:left;width:100%}
.meter{margin:.2rem 0 1.1rem}
.meter-label{font-size:.86rem;font-weight:600;margin-bottom:.5rem;display:flex;justify-content:space-between}
.meter-label b{color:var(--blue)}
.meter-track{height:12px;background:rgba(212,200,176,.4);border-radius:var(--r-pill);overflow:hidden}
.meter-fill{height:100%;width:0;background:linear-gradient(90deg,var(--marigold),var(--peach),var(--blush));border-radius:var(--r-pill);transition:width 1s cubic-bezier(.22,1,.36,1)}
.recap-row{display:flex;align-items:center;gap:.8rem;padding:.7rem 0;border-top:1px solid var(--border)}
.recap-row img{width:34px;height:34px;object-fit:contain;flex-shrink:0}
.recap-row .rl{font-size:.74rem;color:var(--ash);text-transform:uppercase;letter-spacing:.08em}
.recap-row .rv{font-size:.98rem;font-weight:600}

/* ── founder ── */
.founder{flex:1;display:flex;flex-direction:column;justify-content:center;text-align:center;align-items:center}
.founder-photo{width:120px;height:120px;border-radius:50%;object-fit:cover;border:3px solid var(--white);box-shadow:0 8px 24px -10px rgba(0,0,0,.3);margin-bottom:1rem}
.founder .big{font-family:var(--font-h);font-size:clamp(2.6rem,8vw,3.6rem);color:var(--blue);line-height:1}
.founder .lbl{font-size:1.02rem;color:var(--ink);margin:.3rem 0 1rem;max-width:24ch}
.founder blockquote{font-size:.96rem;color:var(--graphite);font-style:italic;max-width:34ch;line-height:1.5}
.founder .who{font-size:.82rem;color:var(--ash);font-weight:600;margin-top:.7rem;display:flex;align-items:center;gap:.4rem;justify-content:center}
.founder .who img{width:18px;height:18px}

/* ── stat counter ── */
.stat{flex:1;display:flex;flex-direction:column;justify-content:center;text-align:center;align-items:center}
.stat img{width:84px;height:84px;margin-bottom:.6rem}
.stat .num{font-family:var(--font-h);font-size:clamp(3rem,12vw,4.6rem);color:var(--blue);line-height:1}
.stat .lbl{font-size:1.05rem;color:var(--graphite);margin-top:.2rem;max-width:24ch}

/* ── testimonial ── */
.testi{background:var(--white);border:1px solid var(--border);border-radius:var(--r-card);padding:1.1rem 1.2rem;text-align:left;max-width:440px;width:100%;margin:0 auto .8rem}
.testi .stars{color:var(--marigold);font-size:.95rem;margin-bottom:.4rem}
.testi p{font-size:.96rem;color:var(--ink);line-height:1.5}
.testi .who{font-size:.82rem;color:var(--ash);margin-top:.5rem;font-weight:600}

/* ── now vs planpin compare ── */
.compare{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin:.4rem 0}
.cmp{border-radius:var(--r-card);padding:1rem .9rem;border:1.5px solid var(--border)}
.cmp.now{background:rgba(238,163,129,.1);border-color:rgba(238,163,129,.4)}
.cmp.pp{background:rgba(4,48,194,.05);border-color:rgba(4,48,194,.3)}
.cmp h3{font-family:var(--font-h);font-weight:400;font-size:1.2rem;margin-bottom:.6rem}
.cmp.now h3{color:var(--peach)}
.cmp.pp h3{color:var(--blue)}
.cmp .line{display:flex;gap:.5rem;align-items:flex-start;font-size:.86rem;margin-bottom:.55rem;line-height:1.35}
.cmp .line svg{width:15px;height:15px;flex-shrink:0;margin-top:.15rem}
.cmp.now .line svg{color:var(--peach)}
.cmp.pp .line svg{color:var(--blue)}

/* ── diagnosis ── */
.diag-list{display:flex;flex-direction:column;gap:1rem;margin:.3rem 0 1.2rem}
.diag-row .diag-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.4rem}
.diag-name{font-size:.95rem;font-weight:600}
.diag-pct{font-family:var(--font-h);font-size:1.2rem;color:var(--blue)}
.diag-track{height:10px;background:rgba(212,200,176,.4);border-radius:var(--r-pill);overflow:hidden}
.diag-bar{height:100%;width:0;background:linear-gradient(90deg,var(--blue),var(--lilac));border-radius:var(--r-pill);transition:width .9s cubic-bezier(.22,1,.36,1)}
.deepdive{background:var(--white);border:1px solid var(--border);border-radius:var(--r-card);padding:1.1rem 1.2rem;margin-bottom:.4rem}
.deepdive .dd-h{display:flex;align-items:center;gap:.55rem;font-weight:700;margin-bottom:.5rem}
.deepdive .dd-h img{width:26px;height:26px}
.deepdive p{font-size:.92rem;color:var(--graphite);line-height:1.5}
.deepdive p b{color:var(--blue)}

/* ── projection (results) ── */
.proj{background:var(--white);border:1px solid var(--border);border-radius:var(--r-card);padding:1.1rem 1.2rem .6rem;margin:.4rem 0}
.proj .proj-h{font-size:.86rem;font-weight:600;margin-bottom:.2rem}
.proj svg{width:100%;height:120px;display:block}
.proj .proj-ends{display:flex;justify-content:space-between;font-size:.74rem;color:var(--ash);margin-top:-.2rem}

/* fixes / itinerary (results) reused from before */
.res-lead{font-size:1.02rem;color:var(--graphite);margin-bottom:1.2rem}
.res-lead b{color:var(--ink)}
.res-block-label{font-size:.74rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--blue);margin:1.6rem 0 .8rem}
.fix-list{display:flex;flex-direction:column;gap:.7rem}
.fix{display:flex;gap:.75rem;background:var(--white);border:1px solid var(--border);border-radius:var(--r-card);padding:.95rem 1.1rem}
.fix .fx-ic{flex-shrink:0;width:26px;height:26px;border-radius:var(--r-pill);background:rgba(4,48,194,.08);display:inline-flex;align-items:center;justify-content:center}
.fix .fx-ic svg{width:15px;height:15px;color:var(--blue)}
.fix .fx-body strong{display:block;font-size:.92rem;margin-bottom:.15rem}
.fix .fx-body span{font-size:.88rem;color:var(--graphite);line-height:1.45}
.itin-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-sheet);overflow:hidden;margin-top:.4rem}
.itin-head{background:linear-gradient(135deg,var(--blue),#0628a0);color:#fff;padding:1.2rem 1.3rem}
.itin-head .pill{display:inline-block;font-size:.7rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;background:rgba(255,255,255,.2);padding:.25rem .7rem;border-radius:var(--r-pill);margin-bottom:.6rem}
.itin-head h3{font-family:var(--font-h);font-weight:400;font-size:1.5rem;line-height:1.15}
.itin-head p{font-size:.85rem;color:rgba(255,255,255,.85);margin-top:.3rem}
.itin-day{display:flex;gap:.9rem;padding:1rem 1.3rem;border-bottom:1px solid var(--border)}
.itin-day:last-child{border-bottom:none}
.itin-time{flex-shrink:0;width:74px;font-size:.78rem;font-weight:600;color:var(--blue);text-transform:uppercase;letter-spacing:.04em;padding-top:.1rem}
.itin-spot{font-size:.95rem;color:var(--ink);line-height:1.45}
.itin-foot{padding:.9rem 1.3rem;font-size:.8rem;color:var(--ash);text-align:center;background:var(--canvas)}
.legal{font-size:.74rem;color:var(--ash);text-align:center;padding:1.4rem 0 .4rem}
.legal a{color:var(--graphite);text-decoration:underline}

/* ── modal (snuck-in loader question / soft-exit) ── */
.modal{position:fixed;inset:0;z-index:90;display:none;align-items:center;justify-content:center;padding:1.2rem}
.modal.open{display:flex}
.modal-bg{position:absolute;inset:0;background:rgba(8,8,8,.5);backdrop-filter:blur(4px)}
.modal-card{position:relative;background:var(--white);border-radius:var(--r-sheet);padding:1.6rem 1.4rem;max-width:420px;width:100%;animation:pop .3s ease both}
.modal-card h3{font-family:var(--font-h);font-weight:400;font-size:1.5rem;margin-bottom:.9rem;text-align:center}

/* ── loader ── */
.loader{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.loader h2{font-family:var(--font-h);font-weight:400;font-size:clamp(1.7rem,5vw,2.3rem);margin-bottom:1.3rem}
.load-bars{width:100%;max-width:360px;display:flex;flex-direction:column;gap:.9rem}
.load-bar .lb-top{display:flex;justify-content:space-between;font-size:.86rem;font-weight:600;margin-bottom:.35rem;color:var(--graphite)}
.load-bar.done .lb-top{color:var(--ink)}
.load-bar .lb-track{height:9px;background:rgba(212,200,176,.4);border-radius:var(--r-pill);overflow:hidden}
.load-bar .lb-fill{height:100%;width:0;background:var(--blue);border-radius:var(--r-pill);transition:width .6s ease}
.load-proof{margin-top:1.6rem;font-size:.82rem;color:var(--ash)}

/* ── testimonial (enriched) ── */
.testi-wrap{display:flex;flex-direction:column}
.testi-head{text-align:center;margin-bottom:1rem}
.testi-head .th-rating{font-family:var(--font-h);font-size:2.2rem;color:var(--ink);display:inline-flex;align-items:center;gap:.5rem}
.testi-head .th-rating .stars{color:var(--marigold);font-size:1.1rem;letter-spacing:.04em}
.testi-head .th-sub{font-size:.88rem;color:var(--graphite);margin-top:.2rem}
.testi .who{display:flex;align-items:center;gap:.55rem}

.pc-name{font-family:var(--font-h);font-size:1.45rem;line-height:1.1}

.plan-pill.loc{background:#1A46D5;color:#fff}
.plan-pill.loc .dot{width:7px;height:7px;border-radius:50%;background:#fff;display:inline-block}
.plan-pill.cat{color:var(--ink)}
.plan-transit{display:flex;gap:.6rem;padding:.7rem 0 .7rem .35rem;align-items:flex-start}
.plan-transit .pt-ic{flex-shrink:0;width:22px;height:22px;color:var(--ink)}
.plan-transit .pt-ic svg{width:22px;height:22px;display:block}
.pt-top{font-size:.88rem;font-weight:600;color:var(--ink)}
.pt-note{font-size:.84rem;color:var(--graphite);line-height:1.38}
.plan-foot{display:flex;align-items:center;justify-content:center;gap:.45rem;border:1px dashed var(--ash);border-radius:14px;padding:.65rem;margin-top:.5rem;font-family:var(--font-h);font-size:1.05rem;color:var(--ash);text-transform:uppercase}
.plan-foot svg{width:18px;height:18px}

/* ---- Navigation ---------------------------------------------------------- */
function go(n){ n=clampIdx(n); idx=n; persist(); show(n,false); fireStep(n); }
function advance(){
  // soft-exit gate: low-intent dreamers route to email-nurture, not the paywall
  var step = STEPS[idx];
  if(step.type==='diagnosis' && isLowIntent()){ openSoftExit(); return; }
  if(idx < TOTAL-1) go(idx+1);
}
function isLowIntent(){
  var a = state.answers;
  return a.next_trip==='none' && a.itinerary_help==='unsure';
}
function show(n, instant){
  var screens = stage.children;
  for(var i=0;i<screens.length;i++) screens[i].classList.toggle('active', i===n);
  var step = STEPS[n];
  topbar.classList.toggle('hidden', step.type==='intro');
  backBtn.disabled = (n<=0) || step.type==='loader' || step.type==='results';
  fill.style.width = Math.round((n/(TOTAL-1))*100) + '%';
  window.scrollTo(0,0);
  if(step.type==='recap')     populateRecap(n);
  if(step.type==='stat')      animateStat(n, step);
  if(step.type==='compare')   animateBars(n,'[data-bar]');
  if(step.type==='diagnosis'){ fire('diagnosis_view',{content_name:'diagnosis'},'ViewContent'); populateDiagnosis(n); }
  if(step.type==='loader')    runLoader(n);
  if(step.type==='results'){  populateResults(n); fire('results_view',{content_name:'results'},'ViewContent'); }
}

/* ---- Screen builders ----------------------------------------------------- */
function buildScreen(step,i){
  var s = document.createElement('section'); s.className='screen'; s.setAttribute('data-i',i);
  switch(step.type){
    case 'intro':       s.innerHTML = introHTML(); break;
    case 'choice':      s.innerHTML = headHTML(step) + choiceHTML(step) + (step.multi||step.type==='choice'&&needsContinue(step)?actionsHTML('Continue',true):''); break;
    case 'slider':      s.innerHTML = headHTML(step) + sliderHTML(step) + actionsHTML('Continue',false); break;
    case 'likert':      s.innerHTML = headHTML(step) + likertHTML(step) + actionsHTML('Continue',true); break;
    case 'recap':       s.innerHTML = recapShellHTML(step) + actionsHTML("That's me",false); break;
    case 'founder':     s.innerHTML = founderHTML() + actionsHTML('Keep going',false); break;
    case 'stat':        s.innerHTML = statHTML(step) + actionsHTML('Continue',false); break;
    case 'testimonial': s.innerHTML = testiHTML(step) + actionsHTML('Continue',false); break;
    case 'compare':     s.innerHTML = compareShellHTML(step) + actionsHTML('Show my blockers',false); break;
    case 'diagnosis':   s.innerHTML = diagnosisShellHTML(step) + actionsHTML('Show me the fix',false); break;
    case 'email':       s.innerHTML = emailHTML(step); break;
    case 'loader':      s.innerHTML = loaderHTML(); break;
    case 'results':     s.innerHTML = '<div class="results"></div>'; break;
  }
  wire(s, step, i);
  return s;
}
function needsContinue(step){ return false; } // single-select auto-advances

  return '<div class="q-head">'+
    (step.phase?'<span class="eyebrow q-phase">'+step.phase+'</span>':'')+

/* ---- Wiring -------------------------------------------------------------- */
function wire(s, step, i){
  if(step.type==='choice'){
    s.querySelectorAll('.opt').forEach(function(btn){
      btn.addEventListener('click', function(){
        var val = btn.getAttribute('data-val');
        if(step.multi){
          var arr = Array.isArray(state.answers[step.key])?state.answers[step.key].slice():[];
          var p = arr.indexOf(val);
          if(p>-1){ arr.splice(p,1); btn.classList.remove('selected'); } else { arr.push(val); btn.classList.add('selected'); }
          state.answers[step.key]=arr; persist();
          var prim=s.querySelector('[data-primary]'); if(prim) prim.disabled = arr.length===0;
        } else {
          s.querySelectorAll('.opt').forEach(function(b){ b.classList.toggle('selected', b===btn); });
          state.answers[step.key]=val; persist();
          setTimeout(advance,170);
        }
      });
    });
  }
  var slider = s.querySelector('[data-slider]');
  if(slider){ var out=s.querySelector('[data-sliderval]');
    slider.addEventListener('input', function(){ out.textContent=paceLabel(+slider.value); state.answers[step.key]=+slider.value; persist(); }); }
  if(step.type==='likert'){
    s.querySelectorAll('.likert-row').forEach(function(row){
      var lk=row.getAttribute('data-lkey');
      row.querySelectorAll('.cell').forEach(function(c){
        c.addEventListener('click', function(){
          row.querySelectorAll('.cell').forEach(function(x){ x.classList.toggle('on', x===c); });
          state.answers.likert = state.answers.likert || {};
          state.answers.likert[lk] = +c.getAttribute('data-v'); persist();
          var done = step.statements.every(function(st){ return state.answers.likert[st[0]]; });
          var prim=s.querySelector('[data-primary]'); if(prim) prim.disabled=!done;
        });
      });
    });
  }
  if(step.type==='email'){
    var input=s.querySelector('[data-email]'), err=s.querySelector('[data-emailerr]');
    if(state.answers.email) input.value=state.answers.email;
    input.addEventListener('input', function(){ err.classList.remove('show'); });
    var skip=s.querySelector('[data-skip]');
    if(skip) skip.addEventListener('click', function(){
      fire('quiz_skip_email', null, null);
      postResponses(null, 'web_onboarding');  // still capture the answers, just no email
      advance();
    });
  }
  var prim = s.querySelector('[data-primary]');
  if(prim){ prim.addEventListener('click', function(){ if(step.type==='email'){ submitEmail(s); return; } advance(); }); }
}

/* ---- Email submit -> Supabase -------------------------------------------- */
function submitEmail(s){
  var input=s.querySelector('[data-email]'), err=s.querySelector('[data-emailerr]'), btn=s.querySelector('[data-primary]');
  var email=(input.value||'').trim();
  if(!EMAIL_RE.test(email)){ err.classList.add('show'); input.focus(); return; }
  state.answers.email=email; persist();
  btn.disabled=true; btn.textContent='Building…';
  fire('quiz_complete',{method:'email'},'Lead',{content_name:'onboarding_quiz'});
  postResponses(email,'web_onboarding').finally(function(){ advance(); });
}
function postResponses(email, source){
  var a=state.answers;
  var payload={ email:email, traveler_type:a.traveler_type||null, biggest_pain:a.biggest_pain||null,
    next_trip:a.next_trip||null, region:a.region||null, session_id:state.sid, answers:a, source:source };
  return fetch(SUPABASE_URL+'/rest/v1/onboarding_responses',{ method:'POST',
    headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify(payload) }).then(function(r){ if(r.ok){ posted=true; persist(); } }).catch(function(){});
}

function recapRow(src,l,v){ return '<div class="recap-row"><img src="'+src+'" alt="" onerror="this.style.visibility=\'hidden\'"><div><div class="rl">'+l+'</div><div class="rv">'+v+'</div></div></div>'; }

/* ---- Stat counter -------------------------------------------------------- */
function animateStat(n, step){
  var el = stage.children[n].querySelector('[data-stat]');
  if(!el) return;
  if(step.count){ countComma(el, step.count, step.suffix||'', 2000); return; }
  var m = String(step.num).match(/([\d.]+)(.*)/); if(!m){ el.textContent=step.num; return; }
  countUp(el, parseFloat(m[1]), m[2], 1100, m[1].indexOf('.')>-1?1:0);
}
function countComma(el, target, suffix, ms){
  var start=null;
  function fr(ts){ if(!start) start=ts; var p=Math.min((ts-start)/ms,1);
    // ease-out so it decelerates into the final number
    var e=1-Math.pow(1-p,3);
    el.textContent=Math.round(target*e).toLocaleString('en-US')+(p>=1?suffix:'');
    if(p<1) requestAnimationFrame(fr); }
  requestAnimationFrame(fr);
}

/* ---- Compare / diagnosis bar animation ----------------------------------- */
function animateBars(n, sel){
  var s=stage.children[n];
  requestAnimationFrame(function(){ requestAnimationFrame(function(){
    s.querySelectorAll(sel).forEach(function(b){ b.style.width=b.style.getPropertyValue('--w'); });
  });});
}
function computeBlockers(){
  var a=state.answers, L=a.likert||{};
  var b={ scattered:16, itinerary:16, chaos:14, group:10 };
  var painMap={tabs:'chaos',forget:'scattered',itinerary:'itinerary',coordinate:'group',nearby:'itinerary'};
  if(a.biggest_pain&&painMap[a.biggest_pain]) b[painMap[a.biggest_pain]]+=24;
  if(a.saved_unused==='hundreds'||a.saved_unused==='lost') b.scattered+=14; else if(a.saved_unused==='dozens') b.scattered+=7;
  if(a.plan_method==='screenshots') b.chaos+=12; if(a.plan_method==='wing') b.itinerary+=10; if(a.plan_method==='maps') b.itinerary+=6;
  if(a.travel_with==='friends'||a.travel_with==='family'||a.travel_with==='mix') b.group+=14;
  // Likert battery sharpens the diagnosis
  if(L.save_never) b.scattered += (L.save_never-1)*4;
  if(L.lose_recs)  b.scattered += (L.lose_recs-1)*2, b.chaos += (L.lose_recs-1)*2;
  if(L.plan_work)  b.itinerary += (L.plan_work-1)*4;
  var labels={scattered:'Scattered saves',itinerary:'No real itinerary',chaos:'Tab and screenshot chaos',group:'Group coordination'};
  var keys={scattered:'scattered',itinerary:'itinerary',chaos:'chaos',group:'group'};
  var total=b.scattered+b.itinerary+b.chaos+b.group;
  var rows=Object.keys(b).map(function(k){ return {key:k,name:labels[k],pct:Math.round(b[k]/total*100)}; });
  rows.sort(function(x,y){ return y.pct-x.pct; });
  return rows;
}
function populateDiagnosis(n){
  var s=stage.children[n], list=s.querySelector('[data-diaglist]'), dd=s.querySelector('[data-deepdive]');
  var rows=computeBlockers();
  list.innerHTML=rows.map(function(r){
    return '<div class="diag-row"><div class="diag-top"><span class="diag-name">'+r.name+'</span><span class="diag-pct">'+r.pct+'%</span></div>'+
      '<div class="diag-track"><div class="diag-bar" data-bar style="--w:'+r.pct+'%"></div></div></div>';
  }).join('');
  var DD={
    scattered:['stat-saved','Scattered saves','Your saves are spread across apps and folders, so the best ones get lost. <b>PlanPin pulls every saved spot into one place</b> the moment you share it.'],
    itinerary:['pain-itinerary','No real itinerary','You have the spots, just not a plan. <b>PlanPin turns your saves into a day-by-day itinerary</b> in seconds, ordered so each day flows.'],
    chaos:['pain-tabs','Tab and screenshot chaos','Tabs and screenshots do not scale. <b>PlanPin replaces all of it</b> with one home for every place, on a map.'],
    group:['pain-coordinate','Group coordination','Planning with others is the hard part. <b>PlanPin shared trips</b> let everyone add spots and see the same plan.']
  };
  var top=DD[rows[0].key];
  dd.innerHTML='<div class="dd-h"><img src="'+ic(top[0])+'" alt="" onerror="this.style.display=\'none\'"> '+top[1]+'</div><p>'+top[2]+'</p>';
  animateBars(n,'[data-bar]');
}

/* ---- Loader (staged + snuck-in question) --------------------------------- */
function runLoader(n){
  var s=stage.children[n], bars=s.querySelectorAll('[data-lb]');
  bars.forEach(function(b){ b.classList.remove('done'); b.querySelector('.lb-fill').style.width='0%'; b.querySelector('[data-lbpct]').textContent='0%'; });
  var asked=false;
  function fillBar(i, cb){
    var bar=bars[i]; if(!bar){ cb(); return; }
    bar.querySelector('.lb-fill').style.width='100%';
    bar.querySelector('[data-lbpct]').textContent='100%';
    bar.classList.add('done');
    cb();
  }
  function step(i){
    if(i>=bars.length){ setTimeout(function(){ if(idx===n) advance(); }, 500); return; }
    setTimeout(function(){
      fillBar(i, function(){
        // snuck-in question after the 2nd bar
        if(i===1 && !asked && !state.answers.daypref){ asked=true; askDayPref(function(){ step(i+1); }); }
        else step(i+1);
      });
    }, 650);
  }
  step(0);
}
function askDayPref(done){
  modalCard.innerHTML='<h3>Quick one - when do you like to explore?</h3>'+
    '<div class="options"><button type="button" class="opt" data-dp="morning"><span class="opt-label">Mornings</span><span class="tick">'+CHECK+'</span></button>'+
    '<button type="button" class="opt" data-dp="evening"><span class="opt-label">Evenings</span><span class="tick">'+CHECK+'</span></button>'+
    '<button type="button" class="opt" data-dp="either"><span class="opt-label">Either works</span><span class="tick">'+CHECK+'</span></button></div>';
  openModal();
  modalCard.querySelectorAll('[data-dp]').forEach(function(b){
    b.addEventListener('click', function(){ state.answers.daypref=b.getAttribute('data-dp'); persist(); closeModal(); done(); });
  });
}

/* ---- Soft-exit gate ------------------------------------------------------ */
function openSoftExit(){
  fire('soft_exit_view', {content_name:'soft_exit'}, 'ViewContent', {content_name:'soft_exit'});
  modalCard.innerHTML='<h3>You’re in dreaming mode</h3>'+
    '<p style="text-align:center;color:var(--graphite);font-size:.95rem;margin-bottom:1rem">No trip booked yet? No rush. Drop your email and we’ll send your plan plus a few destination ideas for when you are ready.</p>'+
    '<input type="email" class="email-input" id="seEmail" placeholder="you@email.com" autocomplete="email" inputmode="email">'+
    '<div class="field-err" id="seErr">Please enter a valid email address.</div>'+
    '<div class="q-actions" style="padding-top:1rem"><button type="button" class="btn-pill" id="seSend">Email me my plan</button>'+
    '<button type="button" class="btn-ghost" id="seSkip">Actually, show me my plan now</button></div>';
  openModal(true);
  if(state.answers.email) modalCard.querySelector('#seEmail').value=state.answers.email;
  modalCard.querySelector('#seSend').addEventListener('click', function(){
    var inp=modalCard.querySelector('#seEmail'), err=modalCard.querySelector('#seErr');
    var email=(inp.value||'').trim();
    if(!EMAIL_RE.test(email)){ err.classList.add('show'); inp.focus(); return; }
    state.answers.email=email; persist();
    this.disabled=true; this.textContent='Sending…';
    fire('soft_exit_lead',{method:'email'},'Lead',{content_name:'soft_exit'});
    postResponses(email,'soft_exit').finally(function(){
      modalCard.innerHTML='<h3 style="text-align:center">Sent ✓</h3><p style="text-align:center;color:var(--graphite);margin:.4rem 0 1rem">Check your inbox - your plan and a few ideas are on the way.</p><div class="q-actions" style="padding-top:.4rem"><a class="btn-pill" href="/">Back to home</a></div>';
    });
  });
  // escape hatch: let them continue to the full plan/paywall anyway
  modalCard.querySelector('#seSkip').addEventListener('click', function(){ closeModal(); if(idx<TOTAL-1) go(idx+1); });
}

/* ---- Results (plan reveal + projection + itinerary) ---------------------- */
function populateResults(n){
  var a=state.answers, region=REGIONS[a.region]||REGIONS.other, city=region.city;
  var verb = a.next_trip==='booked'?'before you fly':(a.next_trip==='dreaming'?'the moment you book':'before your next trip');
  var painMap={
    tabs:['Share the reel, we save the place','One home for every spot, no more 14 open tabs.'],
    forget:['We keep the reel, note and location together','So you always remember why you saved it.'],
    itinerary:['Auto-build a day-by-day trip','PlanPin turns your saved spots into an itinerary in seconds.'],
    coordinate:['Shared trips for your crew','Everyone adds spots and sees the same plan.'],
    nearby:['See everything on a map','Spots grouped by area so each day actually flows.']
  };
  var fixes=[painMap[a.biggest_pain]||painMap.itinerary,
    ['Every saved spot in one place','Instagram, TikTok, Maps and notes, all together.'],
    ['Built around your taste','Tuned to your pace and what you care about most.']];
  var days = region.days.slice();
  if(a.daypref==='evening') days.reverse();
  var head = (city==='your next trip')?'Your next trip, planned and day-by-day '+verb+'.':'Your '+city+' trip, planned and day-by-day '+verb+'.';

  var html='<div class="q-head"><span class="eyebrow q-phase">Your plan</span>'+
      '<h1 class="q-title">Here is how PlanPin fixes your trip planning.</h1>'+
      '<p class="res-lead">You save inspiration across <b>'+sourcesPhrase(a.save_sources)+'</b> and your biggest headache is <b>'+painPhrase(a.biggest_pain)+'</b>. Here is the fix.</p></div>';

  html+='<div class="fix-list">'+fixes.map(function(f){
    return '<div class="fix"><span class="fx-ic">'+CHECK+'</span><div class="fx-body"><strong>'+f[0]+'</strong><span>'+f[1]+'</span></div></div>';
  }).join('')+'</div>';

  html+='<div class="res-block-label">A taste of your plan</div>';
  html+='<p style="font-size:.88rem;color:var(--graphite);margin:-.3rem 0 .8rem">A sample first day - your real plan is built from the spots you actually saved.</p>';
  html+='<div id="plan-mount"></div>';

  html+='<div class="q-actions"><button type="button" class="btn-pill" data-results-cta>See my plan and pricing</button></div>';
  html+='<div class="legal">Free to start. Cancel anytime. <a href="/">Back to home</a></div>';

  var holder=stage.children[n].querySelector('.results')||stage.children[n];
  holder.innerHTML=html;
  mountPlan(a.region);
  holder.querySelector('[data-results-cta]').addEventListener('click', function(){ location.href='paywall.html'; });
}
/* ── App-style "your plan" itinerary preview ──
   Rendered as a React component (mirrors the PlanPin app itinerary screen from
   Figma). Falls back to identical vanilla markup if React/htm did not load
   (offline / CDN blocked), so the results screen always has the visual. */
function planData(region){ return PLAN[region] || PLAN.other; }

/* spot card + transition row builders (shared by the vanilla + React renderers) */
function spotCardHTML(s){
  return '<div class="plan-card" style="background-image:url(\''+planImg(s.img)+'\')"><div class="pc-name">'+s.name+'</div>'+
    '<div class="plan-pills"><span class="plan-pill loc"><span class="dot"></span>'+s.loc+'</span><span class="plan-pill cat" style="background:'+s.color+'">'+s.cat+'</span></div></div>';
}
function transitHTML(s){
  return '<div class="plan-transit"><span class="pt-ic">'+transitIcon(s.transit)+'</span><div><div class="pt-top">'+s.transit+'</div><div class="pt-note">'+s.note+'</div></div></div>';
}
function noteOnlyHTML(s){ return '<div class="plan-transit"><div><div class="pt-note">'+s.note+'</div></div></div>'; }
function dayBlockHTML(spots){
  return (spots||[]).map(function(s,i){ return i===0 ? (spotCardHTML(s)+noteOnlyHTML(s)) : (transitHTML(s)+spotCardHTML(s)); }).join('');
}
/* dayKey: 'all' | '1' | '2' | '3' */
function buildDayRows(region, dayKey){
  var d = planData(region);
  if(dayKey==='all'){
    return ['1','2','3'].map(function(k){ var sp=d.days[k]||[]; return sp.length ? '<div class="plan-daylabel">Day '+k+'</div>'+dayBlockHTML(sp) : ''; }).join('');
  }
  return '<div class="plan-daylabel">Day '+dayKey+'</div>'+dayBlockHTML(d.days[dayKey]||d.days['1']);
}

function ItineraryPreview(props){
  var R = window.React, h = window.htm.bind(R.createElement);
  var d = planData(props.region);
  var st = R.useState('1'), day = st[0], setDay = st[1];
  function raw(s){ return { dangerouslySetInnerHTML:{ __html:s } }; }
  var chips = ['all','1','2','3'].map(function(k){
    return h`<button type="button" key=${k} className=${'pd'+(day===k?' on':'')} onClick=${function(){ setDay(k); }}>${k==='all'?'All':'Day '+k}</button>`;
  });
  return h`<div className="plan-app">
    <div className="plan-title">${d.title}</div>
    <div className="plan-meta"><span><span ...${raw(ICONP.cal)}></span> When you go</span><span><span ...${raw(ICONP.pin)}></span> ${spotTotal(d)} spots</span></div>
    <div className="plan-days">${chips}</div>
    <div ...${raw(buildDayRows(props.region, day))}></div>
    <div className="plan-foot"><span ...${raw(ICONP.plus)}></span> Add another spot</div>
  </div>`;
}

function vanillaPlan(region){
  var d = planData(region);
  function chip(k,label,on){ return '<button type="button" class="pd'+(on?' on':'')+'" data-day="'+k+'">'+label+'</button>'; }
  return '<div class="plan-app"><div class="plan-title">'+d.title+'</div>'+
    '<div class="plan-meta"><span>'+ICONP.cal+' When you go</span><span>'+ICONP.pin+' '+spotTotal(d)+' spots</span></div>'+
    '<div class="plan-days">'+chip('all','All',false)+chip('1','Day 1',true)+chip('2','Day 2',false)+chip('3','Day 3',false)+'</div>'+
    '<div data-rows>'+buildDayRows(region,'1')+'</div>'+
    '<div class="plan-foot">'+ICONP.plus+' Add another spot</div></div>';
}
function attachChips(root, region){
  var rows = root.querySelector('[data-rows]'); if(!rows) return;
  root.querySelectorAll('.pd').forEach(function(chip){
    chip.addEventListener('click', function(){
      root.querySelectorAll('.pd').forEach(function(c){ c.classList.toggle('on', c===chip); });
      rows.innerHTML = buildDayRows(region, chip.getAttribute('data-day'));
    });
  });
}

function mountPlan(region){
  var mount = document.getElementById('plan-mount'); if(!mount) return;
  if(window.React && window.ReactDOM && window.ReactDOM.createRoot && window.htm){
    try { window.ReactDOM.createRoot(mount).render(window.React.createElement(ItineraryPreview, { region:region })); return; }
    catch(e){ /* fall through to vanilla */ }
  }
  mount.innerHTML = vanillaPlan(region);
  attachChips(mount, region);
}

/* ---- Helpers ------------------------------------------------------------- */
function optLabel(key,val){ var st=stepByKey(key); if(!st) return ''; for(var i=0;i<st.options.length;i++) if(st.options[i][0]===val) return st.options[i][1]; return ''; }
function optIconId(key,val){ var st=stepByKey(key); if(!st) return ''; for(var i=0;i<st.options.length;i++) if(st.options[i][0]===val){ var id=st.options[i][2]; return (id&&id.charAt(0)!=='@')?id:''; } return ''; }
function stepByKey(key){ for(var i=0;i<STEPS.length;i++) if(STEPS[i].key===key) return STEPS[i]; return null; }
function sourcesPhrase(arr){
  var map={instagram:'Instagram',tiktok:'TikTok',youtube:'YouTube',google:'Google',notes:'Notes',pinterest:'Pinterest',blogs:'blogs',screenshots:'screenshots',friends:'friends'};
  if(!Array.isArray(arr)||!arr.length) return 'a few different apps';
  var names=arr.map(function(x){ return map[x]||x; });
  if(names.length===1) return names[0];
  if(names.length===2) return names[0]+' and '+names[1];
  return names.slice(0,-1).join(', ')+' and '+names[names.length-1];
}
function painPhrase(p){ var map={tabs:'too many tabs and screenshots',forget:'forgetting why you saved a place',itinerary:'turning saves into an itinerary',coordinate:'coordinating with your travel crew',nearby:'finding spots near each other'}; return map[p]||'turning saves into a real trip'; }
function paceLabel(v){ return v<33?'Chill and slow':(v>66?'Packed and full':'A balanced mix'); }
function countUp(el, target, suffix, ms, decimals){
  if(!el) return; decimals=decimals||0; var start=null;
  function fr(ts){ if(!start) start=ts; var p=Math.min((ts-start)/ms,1); var v=(target*p).toFixed(decimals);
    el.textContent=(decimals?parseFloat(v):Math.round(v))+(suffix||''); if(p<1) requestAnimationFrame(fr); }
  requestAnimationFrame(fr);
}
function openModal(){ modal.classList.add('open'); modal.setAttribute('aria-hidden','false'); }
function closeModal(){ modal.classList.remove('open'); modal.setAttribute('aria-hidden','true'); }

/* ---- Analytics + persistence --------------------------------------------- */
function fire(gaName, gaParams, fbName, fbParams){
  try{ if(typeof gtag==='function') gtag('event',gaName,gaParams||{}); }catch(e){}
  try{ if(typeof fbq==='function'&&fbName){ var std={Lead:1,ViewContent:1,InitiateCheckout:1,CompleteRegistration:1,StartTrial:1,Subscribe:1};
    if(std[fbName]) fbq('track',fbName,fbParams||{}); else fbq('trackCustom',fbName,fbParams||{}); } }catch(e){}
  try{ if(window.PH_KEY && typeof posthog!=='undefined' && posthog.capture) posthog.capture(gaName, gaParams||{}); }catch(e){}
}
function fireStep(n){ fire('quiz_step',{step:n,step_type:STEPS[n].type,step_key:STEPS[n].key||STEPS[n].type}); }
function persist(){ state.idx=idx; state.posted=posted; try{ localStorage.setItem(STORE_KEY,JSON.stringify(state)); }catch(e){} }
function load(){ try{ return JSON.parse(localStorage.getItem(STORE_KEY)||'{}'); }catch(e){ return {}; } }
function clampIdx(n){ n=parseInt(n,10)||0; if(n<0)n=0; if(n>TOTAL-1)n=TOTAL-1; return n; }
function genId(){ return 'pp_'+Math.abs(hashStr(navigator.userAgent+screen.width+'x'+screen.height+document.referrer)).toString(36)+'_'+Math.floor(performance.now()).toString(36); }
function hashStr(s){ var h=0; for(var i=0;i<s.length;i++){ h=(h<<5)-h+s.charCodeAt(i); h|=0; } return h; }

})();
</script>
